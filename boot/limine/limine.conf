# Timeout in seconds that Limine will use before automatically booting.
timeout: 3
randomise_memory: yes # Enable memory randomization for security and stability.

# The entry name that will be displayed in the boot menu.
/Aether
    # We use the Limine boot protocol.
    protocol: limine

    cmdline: init=/bin/init

    # Path to the kernel to boot. boot():/ represents the partition on which limine.conf is located.
    path: boot():/boot/kernel

    # To register a module, uncomment the following line and specify the module path.
    module_path: boot():/boot/Mik_8x16.psf
    module_string: kernel-font.psf

    module_path: boot():/boot/initrd.tar
    module_string: initrd
